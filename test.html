<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSMZ GLOB</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            color: #2c3e50;
            margin: 15px 0;
            font-size: 2.2rem;
        }
        .welcome-text {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin: 15px 0;
        }
        #timer-container {
            font-size: 1.1rem;
            margin: 15px 0;
            padding: 12px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #countdown {
            font-weight: bold;
            color: #e74c3c;
            font-size: 1.4rem;
        }
        #action-btn {
            display: none;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s;
            margin: 20px auto;
            text-decoration: none;
            width: 80%;
            max-width: 300px;
        }
        #action-btn:active {
            transform: scale(0.98);
        }
        .banner-placement {
            width: 100%;
            min-height: 100px;
            margin: 15px auto;
            display: block;
            clear: both;
            position: relative;
        }
        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #95a5a6;
        }
        footer a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="banner-placement">
            <script src="https://gsmzglob.github.io/scripts/1.js"></script>
        </div>

        <h1>GSMZ GLOB</h1>

        <div class="banner-placement">
            <script src="https://gsmzglob.github.io/scripts/1.js"></script>
        </div>

        <div class="welcome-text">
            Welcome to our platform! Please wait a moment.
        </div>

        <div id="timer-container">
            <span id="timer-message">Please wait <span id="countdown">12</span> seconds...</span>
        </div>

        <div class="banner-placement">
            <script src="https://gsmzglob.github.io/scripts/1.js"></script>
        </div>

        <a href="YOUR_LINK_HERE" id="action-btn">Click Here to Proceed</a>

        <div class="banner-placement">
            <script src="https://gsmzglob.github.io/scripts/1.js"></script>
        </div>

        <footer>
            <p>&copy; 2026 GSMZ GLOB. All Rights Reserved.</p>
            
            <div class="banner-placement">
                <script src="https://gsmzglob.github.io/scripts/1.js"></script>
            </div>
            
            <p>Contact us: <a href="mailto:onirec@proton.me">onirec@proton.me</a></p>
        </footer>

        <div class="banner-placement">
            <script src="https://gsmzglob.github.io/scripts/1.js"></script>
        </div>

    </div>

    <script>
        let timeLeft = 12;
        const countdownElement = document.getElementById('countdown');
        const timerMessageElement = document.getElementById('timer-message');
        const actionBtn = document.getElementById('action-btn');

        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                timerMessageElement.innerHTML = "<strong>Scroll Down ↓</strong>";
                actionBtn.style.display = 'block';
            }
        }, 1000);
    </script>

    <script src="https://gsmzglob.github.io/scripts/5.js"></script>
    <script src="https://gsmzglob.github.io/scripts/6.js"></script>

</body>
</html>
