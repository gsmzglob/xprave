<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSMZ ONLINE WEB</title>
    <style>
        /* ستايل كلاسيكي مستوحى من الأرشيف: بسيط، منظم ومريح للعين */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        header {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* الحاوية الرئيسية للمحتوى */
        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            width: 100%;
        }

        /* قسم الكلام الترجيبي */
        .welcome-box {
            background-color: #f5f5f5;
            border: 1px solid #e3e3e3;
            padding: 30px 20px;
            border-radius: 4px;
            text-align: center;
            margin: 20px 0;
        }
        .welcome-box h1 {
            font-size: 22px;
            color: #222222;
            margin-top: 0;
        }
        .welcome-box p {
            font-size: 15px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* صناديق الإعلانات المربوطة بـ banner1.js */
        .gsmz-ad-slot {
            margin: 20px 0;
            padding: 5px;
            background: #fafafa;
            border: 1px dashed #cccccc;
            min-height: 90px;
            text-align: center;
        }

        /* الفوتر السفلي (الكوبيرايت) */
        footer {
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #666666;
        }
    </style>
</head>
<body>

    <header>
        🏛️ GSMZ ONLINE WEB
    </header>

    <div class="content-container">

        <div class="gsmz-ad-slot"></div>

        <div class="welcome-box">
            <h1>Welcome to GSMZ Digital Archive</h1>
            <p>Your clean, fast, and secure hub for high-quality game modifications, custom vehicle models, and premium digital assets. Built for performance and compatibility.</p>
        </div>

        <div class="gsmz-ad-slot"></div>

    </div>

    <footer>
        &copy; 2026 gsmz online. All rights reserved.
    </footer>

    <script src="banner1.js"></script>

</body>
</html>
