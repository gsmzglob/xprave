<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f15;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        h1 {
            color: #f39c12;
            font-size: 26px;
            margin: 10px 0;
        }
        p {
            color: #b3b3b3;
            font-size: 16px;
            line-height: 1.5;
            margin: 0 10px;
        }
        .timer-wrapper {
            margin: 10px 0;
        }
        .timer { 
            font-size: 55px; 
            font-weight: bold; 
            color: #e74c3c; 
        }
        .arrows {
            font-size: 40px;
            color: #2ecc71;
            display: none;
            animation: bounce 1s infinite;
            margin-top: 10px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
        .download-btn {
            display: none;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }
        .ad-slot {
            width: 100%;
            background-color: #1a1a24;
            border: 1px dashed #555577;
            border-radius: 6px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-text {
            font-size: 14px;
            color: #777799;
            margin: 10px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

    <h1>Secure Download Link</h1>

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

    <p>Please wait a few seconds while our system securely verifies and prepares your direct download link package.</p>

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

    <div class="timer-wrapper">
        <div class="timer" id="countdown">15</div>
        <div class="arrows" id="arrow-pointers">↓↓↓</div>
    </div>

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

    <a href="#" id="main-download-link" class="download-btn" rel="noopener noreferrer">DOWNLOAD NOW</a>

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

    <div class="footer-text">© GSMZ All Rights Reserved</div>

    <div class="ad-slot"><script src="https://gsmzglob.github.io/banner1.js"></script></div>

</div>

<script>
    const fileDownloadUrl = "https://www.mediafire.com/file/example.zip"; 

    let timeLeft = 15;
    const countdownEl = document.getElementById('countdown');
    const arrowsEl = document.getElementById('arrow-pointers');
    const downloadBtnEl = document.getElementById('main-download-link');

    const startTimer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(startTimer);
            countdownEl.style.display = 'none';
            arrowsEl.style.display = 'block';
            downloadBtnEl.setAttribute('href', fileDownloadUrl);
            downloadBtnEl.style.display = 'inline-block';
        }
    }, 1000);
</script>

<script src="https://gsmzglob.github.io/popun1.js"></script>

</body>
</html>
